<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroCure — Dispatch Control (UI Demo)</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #070D1A;
      --surface: #0D1526;
      --surface-hover: #142035;
      --border: #1E2D45;
      --accent: #38BDF8;
      --accent-dim: rgba(56,189,248,0.12);
      --text-primary: #E2E8F0;
      --text-secondary: #94A3B8;
      --text-muted: #475569;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .navbar-custom {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }
    .brand span.accent { color: var(--accent); }

    .active-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 4px;
      padding: 4px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: #EF4444;
      font-weight: 700;
    }
    .active-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #EF4444;
      box-shadow: 0 0 8px #EF4444;
      animation: pulse 1.4s infinite;
    }

    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 14px 1.5rem;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      min-width: 120px;
      flex: 1;
    }
    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 12px;
      padding: 12px;
      height: calc(100vh - 56px - 90px);
      overflow: hidden;
    }
    @media (max-width: 992px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    #map {
      height: 100%;
      width: 100%;
      border-radius: 6px;
    }

    .cases-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .cases-search input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 0.8rem;
      padding: 6px 10px;
      outline: none;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      font-weight: 700;
      padding: 3px 8px;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
    .filter-btn.active {
      background: var(--accent);
      color: #0f172a;
      border-color: var(--accent);
    }
    .cases-list {
      flex: 1;
      overflow-y: auto;
    }
    .case-row {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    .case-row:hover {
      background: var(--surface-hover);
    }
    .case-footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 7px;
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Overlay detail panel */
    .overlay-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      z-index: 100;
    }
    .slide-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(420px, 100vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 101;
      display: flex;
      flex-direction: column;
      animation: slideIn 0.2s ease;
      overflow: hidden;
    }
    .slide-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .slide-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .field {
      margin-bottom: 14px;
    }
    .field-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .field-value {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .status-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-secondary);
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 6px 12px;
      cursor: pointer;
    }
    .status-btn.selected, .status-btn:hover {
      background: var(--accent);
      color: #0f172a;
      border-color: var(--accent);
    }
    .update-btn {
      width: 100%;
      background: var(--border);
      border: none;
      border-radius: 4px;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .update-btn.active {
      background: var(--accent);
      color: #0f172a;
      cursor: pointer;
    }
    .update-btn:disabled {
      cursor: not-allowed;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes ripple { 0%{transform:scale(0.8);opacity:0.8} 100%{transform:scale(2.5);opacity:0} }

    .leaflet-container { background: #070D1A; font-family: 'DM Sans', sans-serif; }
    .leaflet-popup-content-wrapper { background: var(--surface); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; }
    .leaflet-popup-tip { background: var(--surface); }
    .leaflet-control-zoom a { background: var(--surface)!important; color: var(--text-secondary)!important; border-color: var(--border)!important; }
    .leaflet-control-zoom a:hover { background: var(--surface-hover)!important; color: var(--text-primary)!important; }
    .leaflet-control-attribution { background: rgba(7,13,26,0.8)!important; color: var(--text-muted)!important; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="navbar-custom">
      <div class="brand">
        🚑
        <span>AEROCURE<span class="accent">_</span></span>
        <span style="font-size:0.65rem; color:var(--text-muted); letter-spacing:0.1em; padding-left:8px; border-left:1px solid var(--border);">
          DISPATCH CONTROL
        </span>
      </div>
      <div class="d-flex align-items-center gap-3">
        <div id="active-indicator" class="active-badge">
          <div class="active-dot"></div>
          <span id="active-count">0</span> ACTIVE
        </div>
        <span style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--text-muted);">UI DEMO</span>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card"><div id="stat-active" class="stat-value" style="color:#EF4444">0</div><div class="stat-label">Active</div></div>
      <div class="stat-card"><div id="stat-total" class="stat-value">0</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div id="stat-received" class="stat-value" style="color:#F59E0B">0</div><div class="stat-label">Received</div></div>
      <div class="stat-card"><div id="stat-dispatched" class="stat-value" style="color:#3B82F6">0</div><div class="stat-label">Dispatched</div></div>
      <div class="stat-card"><div id="stat-airborne" class="stat-value" style="color:#10B981">0</div><div class="stat-label">Airborne</div></div>
      <div class="stat-card"><div id="stat-landed" class="stat-value" style="color:#A78BFA">0</div><div class="stat-label">Landed</div></div>
      <div class="stat-card"><div id="stat-eta" class="stat-value" style="color:var(--accent)">--</div><div class="stat-label">Avg ETA</div></div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">
      <div><div id="map"></div></div>
      <div class="cases-panel">
        <div class="p-2"><input id="search-input" type="text" placeholder="Search cases…" /></div>
        <div class="d-flex gap-1 p-2 flex-wrap" id="filter-buttons">
          <button class="filter-btn active" data-filter="ALL">ALL</button>
          <button class="filter-btn" data-filter="RECEIVED">RECEIVED</button>
          <button class="filter-btn" data-filter="DISPATCHED">DISPATCHED</button>
          <button class="filter-btn" data-filter="AIRBORNE">AIRBORNE</button>
          <button class="filter-btn" data-filter="LANDED">LANDED</button>
          <button class="filter-btn" data-filter="COMPLETED">COMPLETED</button>
        </div>
        <div id="cases-list" class="cases-list"></div>
        <div class="p-2 border-top" style="font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--text-muted);">
          <span id="case-count">0/0 cases</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Case Detail Overlay -->
  <div id="case-overlay" style="display:none;">
    <div class="overlay-backdrop" onclick="closeCaseDetail()"></div>
    <div class="slide-panel">
      <div class="slide-header">
        <div>
          <div id="detail-case-id" style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:6px;"></div>
          <div id="detail-status-badge"></div>
        </div>
        <button class="btn btn-sm btn-outline-secondary" onclick="closeCaseDetail()">✕</button>
      </div>
      <div class="slide-body">
        <div class="field"><div class="field-label">Condition</div><div class="field-value" id="detail-condition"></div></div>
        <div class="field"><div class="field-label">Airstrip</div><div class="field-value" id="detail-airstrip"></div></div>
        <div class="field"><div class="field-label">ETA</div><div class="field-value" id="detail-eta"></div></div>
        <div class="field"><div class="field-label">Created</div><div class="field-value" id="detail-created"></div></div>
        <div class="field"><div class="field-label">Notes</div><div class="field-value" id="detail-notes"></div></div>
        <hr style="border-color:var(--border); margin:20px 0;" />
        <div id="status-update-section"></div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (function() {
      // ----- Mock Data -----
      const mockAirstrips = [
        { code: "HKJK", name: "Jomo Kenyatta International Airport", county: "Nairobi City", city: "Nairobi", airport_type: "large_airport", latitude: -1.318886, longitude: 36.928233 },
        { code: "HKMO", name: "Moi International Airport", county: "Mombasa County", city: "Mombasa", airport_type: "large_airport", latitude: -4.03483, longitude: 39.5942 },
        { code: "HKNW", name: "Nairobi Wilson Airport", county: "Nairobi City", city: "Nairobi", airport_type: "medium_airport", latitude: -1.32172, longitude: 36.8148 },
        { code: "HKNL", name: "Nanyuki Civil Airport", county: "Nyeri County", city: "Gathiuru", airport_type: "medium_airport", latitude: -0.062352, longitude: 37.041296 },
        { code: "HKLK", name: "Lokichogio Airport", county: "Turkana County", city: "Lokichogio", airport_type: "medium_airport", latitude: 4.20412, longitude: 34.348202 },
        { code: "HKUK", name: "Ukunda Airstrip", county: "Kwale County", city: "Ukunda", airport_type: "small_airport", latitude: -4.29333, longitude: 39.571098 },
        { code: "HKMS", name: "Mara Serena Lodge Airstrip", county: "Narok County", city: "Serena", airport_type: "medium_airport", latitude: -1.404588, longitude: 35.008349 },
      ];

      const mockCases = [
        {
          id: "EVAC-001",
          condition_name: "Severe Trauma (GSW)",
          condition_code: "GSW",
          airstrip_name: "Jomo Kenyatta International Airport",
          airstrip_code: "HKJK",
          status: "RECEIVED",
          eta_minutes: null,
          notes: "",
          created_at: new Date(Date.now() - 3600000).toISOString()
        },
        {
          id: "EVAC-002",
          condition_name: "Obstructed Labour",
          condition_code: "OB-LAB",
          airstrip_name: "Moi International Airport",
          airstrip_code: "HKMO",
          status: "DISPATCHED",
          eta_minutes: 45,
          notes: "AMREF flight dispatched",
          created_at: new Date(Date.now() - 7200000).toISOString()
        },
        {
          id: "EVAC-003",
          condition_name: "Snake Bite (Critical)",
          condition_code: "SN-BITE",
          airstrip_name: "Nanyuki Civil Airport",
          airstrip_code: "HKNL",
          status: "AIRBORNE",
          eta_minutes: 20,
          notes: "Anti-venom on board",
          created_at: new Date(Date.now() - 1800000).toISOString()
        },
        {
          id: "EVAC-004",
          condition_name: "Myocardial Infarction",
          condition_code: "MI",
          airstrip_name: "Lokichogio Airport",
          airstrip_code: "HKLK",
          status: "LANDED",
          eta_minutes: 0,
          notes: "Ambulance to Kenyatta National Hospital",
          created_at: new Date(Date.now() - 86400000).toISOString()
        },
        {
          id: "EVAC-005",
          condition_name: "Fractured Femur",
          condition_code: "FX-FEMUR",
          airstrip_name: "Ukunda Airstrip",
          airstrip_code: "HKUK",
          status: "COMPLETED",
          eta_minutes: null,
          notes: "Patient stable, transferred",
          created_at: new Date(Date.now() - 172800000).toISOString()
        }
      ];

      // ----- State -----
      let cases = [...mockCases];
      let airstrips = [...mockAirstrips];
      let selectedCaseId = null;
      let filter = 'ALL';
      let searchQuery = '';
      let map = null;
      let markers = { airstrips: [], cases: [], hospital: null };

      const HOSPITAL = { lat: -1.3005, lng: 36.8075, name: 'Kenyatta National Hospital' };
      const STATUS_COLORS = {
        RECEIVED: '#F59E0B', DISPATCHED: '#3B82F6',
        AIRBORNE: '#10B981', LANDED: '#A78BFA',
        COMPLETED: '#6EE7B7', CANCELLED: '#EF4444',
      };

      // ----- UI rendering functions -----
      function updateUI() {
        renderStats();
        renderCasesPanel();
        updateMapCases();
        updateActiveIndicator();
      }

      function updateActiveIndicator() {
        const active = cases.filter(c => !['COMPLETED', 'CANCELLED'].includes(c.status)).length;
        document.getElementById('active-count').textContent = active;
        const badge = document.getElementById('active-indicator');
        if (active === 0) badge.style.display = 'none';
        else badge.style.display = 'flex';
      }

      function renderStats() {
        const counts = { RECEIVED:0, DISPATCHED:0, AIRBORNE:0, LANDED:0, COMPLETED:0 };
        cases.forEach(c => { if (counts[c.status] !== undefined) counts[c.status]++; });
        const active = cases.filter(c => !['COMPLETED', 'CANCELLED'].includes(c.status)).length;
        const withEta = cases.filter(c => c.eta_minutes && !['COMPLETED', 'CANCELLED'].includes(c.status));
        const avgEta = withEta.length ? Math.round(withEta.reduce((s,c)=>s+c.eta_minutes,0)/withEta.length) : null;

        document.getElementById('stat-active').textContent = active;
        document.getElementById('stat-total').textContent = cases.length;
        document.getElementById('stat-received').textContent = counts.RECEIVED;
        document.getElementById('stat-dispatched').textContent = counts.DISPATCHED;
        document.getElementById('stat-airborne').textContent = counts.AIRBORNE;
        document.getElementById('stat-landed').textContent = counts.LANDED;
        document.getElementById('stat-eta').textContent = avgEta !== null ? `${avgEta}m` : '--';
      }

      function renderCasesPanel() {
        const listEl = document.getElementById('cases-list');
        const countEl = document.getElementById('case-count');
        const filtered = cases.filter(c => {
          if (filter !== 'ALL' && c.status !== filter) return false;
          if (!searchQuery) return true;
          const q = searchQuery.toLowerCase();
          return [c.id, c.condition_name, c.airstrip_name, c.status]
            .some(v => v?.toLowerCase().includes(q));
        });
        countEl.textContent = `${filtered.length} / ${cases.length} cases`;

        if (filtered.length === 0) {
          listEl.innerHTML = `<div class="text-center p-4" style="color:var(--text-muted);">No matching cases</div>`;
          return;
        }

        listEl.innerHTML = filtered.map(c => {
          const ts = new Date(c.created_at).toLocaleString('en-KE', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
          return `
            <div class="case-row" data-id="${c.id}">
              <div class="d-flex align-items-center justify-content-between mb-1">
                <span style="font-family:'Space Mono',monospace;font-size:0.75rem;font-weight:700;color:var(--text-primary)">${c.id}</span>
                ${getStatusBadge(c.status)}
              </div>
              <div style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:3px">${c.condition_name}</div>
              <div class="case-footer">
                <span>✈ ${c.airstrip_name}</span>
                <span>${c.eta_minutes ? `${c.eta_minutes}m ETA` : ts}</span>
              </div>
            </div>`;
        }).join('');

        listEl.querySelectorAll('.case-row').forEach(row => {
          row.addEventListener('click', () => openCaseDetail(row.dataset.id));
        });
      }

      function getStatusBadge(status) {
        const cfg = STATUS_COLORS[status] || '#94a3b8';
        return `<span class="status-badge" style="background:${cfg}20;color:${cfg};border:1px solid ${cfg}40">
          <span class="status-dot" style="background:${cfg};box-shadow:0 0 6px ${cfg};"></span>
          ${status}
        </span>`;
      }

      // ----- Case Detail -----
      function openCaseDetail(caseId) {
        selectedCaseId = caseId;
        renderCaseDetail();
        document.getElementById('case-overlay').style.display = 'block';
      }

      window.closeCaseDetail = function() {
        selectedCaseId = null;
        document.getElementById('case-overlay').style.display = 'none';
      };

      function renderCaseDetail() {
        const c = cases.find(c => c.id === selectedCaseId);
        if (!c) return;

        document.getElementById('detail-case-id').textContent = c.id;
        document.getElementById('detail-status-badge').innerHTML = getStatusBadge(c.status);
        document.getElementById('detail-condition').textContent = `[${c.condition_code}] ${c.condition_name}`;
        document.getElementById('detail-airstrip').textContent = c.airstrip_name;
        document.getElementById('detail-eta').textContent = c.eta_minutes ? `${c.eta_minutes} minutes` : 'Not set';
        document.getElementById('detail-created').textContent = new Date(c.created_at).toLocaleString('en-KE', {
          weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
        });
        document.getElementById('detail-notes').textContent = c.notes || '—';

        const transitions = {
          RECEIVED: ['DISPATCHED', 'CANCELLED'],
          DISPATCHED: ['AIRBORNE', 'CANCELLED'],
          AIRBORNE: ['LANDED', 'CANCELLED'],
          LANDED: ['COMPLETED'],
          COMPLETED: [],
          CANCELLED: [],
        }[c.status] || [];

        const section = document.getElementById('status-update-section');
        if (transitions.length === 0) {
          section.innerHTML = `<div class="text-center" style="color:var(--text-muted);">No further updates available.</div>`;
          return;
        }

        section.innerHTML = `
          <div class="field-label">Update Status</div>
          <div class="d-flex flex-wrap gap-2 mb-3" id="status-buttons">
            ${transitions.map(s => `<button class="status-btn" data-status="${s}">→ ${s}</button>`).join('')}
          </div>
          <div class="field-label">ETA (minutes)</div>
          <input type="number" id="eta-input" class="form-control mb-3" placeholder="e.g. 45" value="${c.eta_minutes ?? ''}" style="background:var(--bg);border-color:var(--border);color:var(--text-primary);" />
          <div class="field-label">Notes</div>
          <textarea id="notes-input" class="form-control mb-3" rows="3" placeholder="Dispatcher notes…" style="background:var(--bg);border-color:var(--border);color:var(--text-primary);">${c.notes ?? ''}</textarea>
          <button id="submit-update" class="update-btn" disabled>SET → STATUS</button>
          <p class="text-center mt-2" style="font-size:0.65rem;color:var(--text-muted);">This is a UI demo – updates only change local state.</p>
        `;

        let selectedStatus = null;
        const statusBtns = section.querySelectorAll('.status-btn');
        const submitBtn = document.getElementById('submit-update');

        statusBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            statusBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedStatus = btn.dataset.status;
            submitBtn.textContent = `SET → ${selectedStatus}`;
            submitBtn.disabled = false;
            submitBtn.classList.add('active');
          });
        });

        submitBtn.addEventListener('click', () => {
          if (!selectedStatus) return;
          // Update mock data locally
          const idx = cases.findIndex(c => c.id === selectedCaseId);
          if (idx === -1) return;
          cases[idx].status = selectedStatus;
          cases[idx].notes = document.getElementById('notes-input').value;
          const etaVal = document.getElementById('eta-input').value;
          cases[idx].eta_minutes = etaVal ? parseInt(etaVal) : null;
          updateUI();
          closeCaseDetail();
        });
      }

      // ----- Map -----
      function initMap() {
        map = L.map('map', { center: [0.5, 37.5], zoom: 6 });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '© OpenStreetMap © CARTO',
          maxZoom: 19,
        }).addTo(map);

        const hospIcon = L.divIcon({
          html: `<div style="width:28px;height:28px;border-radius:50%;background:#fff;border:2px solid #10B981;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 10px #10B98150;">🏥</div>`,
          iconSize: [28,28], iconAnchor: [14,14],
        });
        markers.hospital = L.marker([HOSPITAL.lat, HOSPITAL.lng], { icon: hospIcon })
          .addTo(map)
          .bindPopup(`<b>🏥 ${HOSPITAL.name}</b><br>Receiving hospital`);
      }

      function updateMapAirstrips() {
        if (!map) return;
        markers.airstrips.forEach(m => m.remove());
        markers.airstrips = [];
        airstrips.forEach(a => {
          const icon = L.divIcon({
            html: `<div style="width:10px;height:10px;border-radius:50%;background:#334155;border:1.5px solid #64748B;box-shadow:0 0 4px #00000080;"></div>`,
            iconSize: [10,10], iconAnchor: [5,5],
          });
          const m = L.marker([a.latitude, a.longitude], { icon })
            .addTo(map)
            .bindPopup(`<div style="font-family:monospace;font-size:12px;"><b>✈ ${a.name}</b><br>${a.county ?? ''}<br><span style="opacity:0.6">${a.code}</span></div>`);
          markers.airstrips.push(m);
        });
      }

      function updateMapCases() {
        if (!map) return;
        markers.cases.forEach(m => m.remove());
        markers.cases = [];
        const activeCases = cases.filter(c => !['COMPLETED', 'CANCELLED'].includes(c.status));
        activeCases.forEach(c => {
          const airstrip = airstrips.find(a => a.code === c.airstrip_code);
          if (!airstrip) return;
          const color = STATUS_COLORS[c.status] || '#94a3b8';
          const icon = L.divIcon({
            html: `<div style="position:relative;width:20px;height:20px;">
              <div style="position:absolute;inset:0;border-radius:50%;background:${color}30;animation:ripple 1.5s ease-out infinite;"></div>
              <div style="position:absolute;inset:4px;border-radius:50%;background:${color};box-shadow:0 0 8px ${color};"></div>
            </div>`,
            iconSize: [20,20], iconAnchor: [10,10],
          });
          const m = L.marker([airstrip.latitude, airstrip.longitude], { icon })
            .addTo(map)
            .bindPopup(`<div style="font-family:monospace;font-size:12px;"><b>${c.id}</b><br>${c.condition_name}<br><span style="color:${color};font-weight:700;">${c.status}</span>${c.eta_minutes ? `<br>ETA: ${c.eta_minutes} min` : ''}</div>`)
            .on('click', () => openCaseDetail(c.id));
          markers.cases.push(m);
        });
      }

      // ----- Event listeners -----
      document.getElementById('search-input').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderCasesPanel();
      });

      document.getElementById('filter-buttons').addEventListener('click', (e) => {
        if (e.target.classList.contains('filter-btn')) {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          filter = e.target.dataset.filter;
          renderCasesPanel();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') window.closeCaseDetail();
      });

      // ----- Initialise -----
      window.addEventListener('DOMContentLoaded', () => {
        initMap();
        // Use mock data
        airstrips = mockAirstrips;
        cases = mockCases;
        updateMapAirstrips();
        updateUI();
      });
    })();
  </script>
</body>
</html>
